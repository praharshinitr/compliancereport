spring.application.name=compliancereport
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/compliancereportdb
spring.datasource.username=root
spring.datasource.password=hari
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.springframework=INFO
logging.level.com.project.kpireport=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

jwt.secret=RetailFlowSecretKey2026RetailFlowSecretKey2026RetailFlowSecretKey2026
jwt.expiration=86400000

kpi.service.url=http://localhost:8082

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
